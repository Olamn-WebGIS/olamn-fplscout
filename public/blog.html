<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{BLOG_TITLE}}</title>
  <meta name="description" content="{{BLOG_DESCRIPTION}}" />
  <meta property="og:title" content="{{BLOG_TITLE}}" />
  <meta property="og:description" content="{{BLOG_DESCRIPTION}}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{BLOG_URL}}" />
  <meta property="og:image" content="{{BLOG_IMAGE}}" />
  <meta property="article:published_time" content="{{BLOG_PUBLISHED_AT}}" />
  <meta property="og:site_name" content="FPL Scout" />
  <meta name="robots" content="index, follow" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{BLOG_TITLE}}" />
  <meta name="twitter:description" content="{{BLOG_DESCRIPTION}}" />
  <meta name="twitter:image" content="{{BLOG_IMAGE}}" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="apple-touch-icon" href="/images/favicon.svg" />
  <link rel="canonical" href="{{BLOG_CANONICAL}}" />
  <script type="application/ld+json">{{BLOG_JSONLD}}</script>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .blog-page { max-width: 980px; margin: 0 auto; padding: 2rem 1rem; }
    .blog-list-item, .blog-post { background: #fff; border-radius: 16px; box-shadow: 0 14px 40px rgba(0,0,0,0.08); margin-bottom: 1.75rem; padding: 1.75rem; }
    .blog-list-item h2, .blog-post h1 { margin: 0 0 1rem; font-size: clamp(1.5rem, 2.4vw, 2.1rem); }
    .blog-list-item p, .blog-post p { line-height: 1.75; color: #444; }
    .blog-meta { display: flex; flex-wrap: wrap; gap: 1rem; color: #777; margin: 1rem 0; }
    .blog-actions { margin-top: 1.25rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
    .btn-share, .btn-subscribe { cursor: pointer; padding: 0.85rem 1.35rem; border-radius: 999px; border: none; background: #0070f3; color: #fff; font-weight: 600; }
    .blog-read-link { color: #0a4cf5; text-decoration: none; font-style: italic; font-weight: 600; border-bottom: 1px dashed rgba(10, 76, 245, 0.8); padding-bottom: 1px; transition: color 0.2s ease, border-color 0.2s ease; }
    .blog-read-link:hover { color: #0633c7; border-color: rgba(10, 76, 245, 1); }
    .btn-icon { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; height: 42px; padding: 0 0.85rem; border-radius: 999px; border: 1px solid #dce4f2; background: #fff; color: #0f172a; font-weight: 700; font-size: 1.05rem; transition: background 0.2s ease, border-color 0.2s ease; }
    .btn-share-icon { padding: 0 0.9rem; }
    .btn-icon:hover { background: #f8fbff; border-color: #cbd5e1; }
    .btn-icon span { margin-left: 0.35rem; font-weight: 700; }
    .blog-actions-minimal { gap: 0.5rem; }
    .blog-actions-minimal button { min-width: auto; padding: 0.75rem 0.95rem; }
    .blog-actions-minimal #like-button { display: inline-flex; align-items: center; gap: 0.35rem; }
    .blog-article-footer { display: flex; justify-content: flex-end; margin-top: 1.75rem; color: #475569; font-style: italic; font-size: 0.95rem; }
    .comments-section { margin-top: 2rem; background: #fff; border-radius: 18px; box-shadow: 0 14px 40px rgba(0,0,0,0.08); padding: 1.75rem; }
    .comments-section h2 { margin-bottom: 1rem; }
    .comment-form { display: grid; gap: 1rem; margin-bottom: 1.5rem; }
    .comment-field label { display: block; margin-bottom: 0.5rem; font-weight: 700; color: #1e293b; }
    .comment-field input, .comment-field textarea { width: 100%; padding: 0.95rem 1rem; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 0.95rem; }
    .comment-list { display: grid; gap: 1rem; }
    .comment-card { background: #f8fbff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1rem 1.1rem; }
    .comment-card-header { display: flex; justify-content: space-between; gap: 1rem; align-items: center; margin-bottom: 0.7rem; color: #334155; }
    .comment-card-header strong { font-weight: 700; }
    .comment-card p { color: #334155; line-height: 1.7; margin: 0; }
    #subscribe-modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); z-index: 9999; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
    #subscribe-modal.active { opacity: 1; pointer-events: all; }
    #subscribe-modal .modal-card { background: white; border-radius: 20px; padding: 2rem; max-width: 420px; width: 100%; text-align: center; }
    #subscribe-modal input { width: 100%; padding: 0.9rem 1rem; margin: 1rem 0; border: 1px solid #ddd; border-radius: 12px; }
    #subscribe-modal button { width: 100%; }
  </style>
</head>
<body>
  <div class="blog-page">
    <div id="blog-list-container">{{BLOG_LIST_CONTENT}}</div>
    <div id="blog-post-container" style="display:none">{{BLOG_STATIC_CONTENT}}</div>
    <div id="comments-container"></div>
  </div>

  <div id="subscribe-modal" class="subscribe-modal">
    <div class="modal-card">
      <h2>Stay updated with FPL Scout</h2>
      <p>Subscribe to receive blog summaries and transfer alerts straight to your inbox.</p>
      <input id="newsletter-email" type="email" placeholder="Enter your email" />
      <button id="newsletter-submit" class="btn-subscribe">Subscribe</button>
      <button id="newsletter-close" style="margin-top:0.75rem; background:#f2f2f2; color:#111;">Close</button>
      <p style="font-size:0.85rem; color:#666; margin-top:1rem;">We only send FPL insights and new article alerts.</p>
    </div>
  </div>

  <script src="/blog.js"></script>
  <script src="/layout.js"></script>
  <script src="/app.js"></script>
</body>
</html>
