<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Application | FPL Scout</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: linear-gradient(135deg, #07111f 0%, #0f172a 100%); color: #f8fafc; }
    .track-shell { max-width: 760px; margin: 3rem auto 4rem; padding: 0 1.2rem; }
    .card { background: rgba(15,23,42,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 2rem; }
    .card h1 { margin-top: 0; color: white; }
    .row { display: flex; gap: .8rem; margin-top: 1rem; flex-wrap: wrap; }
    input { flex: 1; min-width: 220px; border: 1px solid rgba(255,255,255,0.12); background: #0b1220; color: white; border-radius: 999px; padding: .85rem 1rem; }
    button { border: 0; background: linear-gradient(135deg, #00c853, #009c40); color: black; font-weight: 800; padding: .85rem 1.1rem; border-radius: 999px; cursor: pointer; }
    .result { margin-top: 1.2rem; color: #cbd5e1; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="track-shell">
    <div class="card">
      <h1>Track your application</h1>
      <p>Enter the email address used for your application to see the latest status.</p>
      <div class="row">
        <input id="email" type="email" placeholder="you@example.com" />
        <button id="track-btn">Check status</button>
      </div>
      <div id="result" class="result"></div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/layout.js"></script>
  <script>
    const button = document.getElementById('track-btn');
    const result = document.getElementById('result');
    button.addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      result.textContent = 'Checking...';
      const response = await fetch(`/api/careers/track?email=${encodeURIComponent(email)}`);
      const data = await response.json();
      result.textContent = data.success ? `Status: ${data.applicant.status}` : (data.message || 'Unable to load your application.');
    });
  </script>
</body>
</html>
