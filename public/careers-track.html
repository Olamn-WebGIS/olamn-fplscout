<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Application | FPL Scout</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: linear-gradient(135deg, #07111f 0%, #0f172a 100%); color: #f8fafc; }
    .track-shell { max-width: 760px; margin: 3rem auto 4rem; padding: 0 1.2rem; }
    .card { background: rgba(15,23,42,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 2rem; }
    .card h1 { margin-top: 0; color: white; }
    .row { display: flex; gap: .8rem; margin-top: 1rem; flex-wrap: wrap; }
    input { flex: 1; min-width: 220px; border: 1px solid rgba(255,255,255,0.12); background: #0b1220; color: white; border-radius: 999px; padding: .85rem 1rem; }
    button { border: 0; background: linear-gradient(135deg, #00c853, #009c40); color: black; font-weight: 800; padding: .85rem 1.1rem; border-radius: 999px; cursor: pointer; }
    .result { margin-top: 1.6rem; }
    .status-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 1.5rem; }
    .status-card h2 { margin: 0 0 0.5rem; font-size: 1.3rem; color: #f8fafc; }
    .status-card p { margin: 0.6rem 0; color: #cbd5e1; line-height: 1.6; }
    .status-tag { display: inline-flex; align-items: center; justify-content: center; padding: 0.55rem 0.9rem; border-radius: 999px; background: rgba(0,200,83,0.15); color: #00c853; font-weight: 700; text-transform: uppercase; font-size: 0.82rem; letter-spacing: 0.08em; }
    .status-details { display: grid; gap: 0.85rem; margin-top: 1rem; }
    .status-detail { display: flex; justify-content: space-between; gap: 1rem; color: #e2e8f0; }
    .status-detail span:first-child { color: #94a3b8; }
    .status-error { background: rgba(220,38,38,0.12); border: 1px solid rgba(220,38,38,0.2); padding: 1rem; border-radius: 16px; color: #fecaca; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="track-shell">
    <div class="card">
      <h1>Track your application</h1>
      <p>Enter the email address used for your application to see the latest status.</p>
      <div class="row">
        <input id="email" type="email" placeholder="you@example.com" />
        <button id="track-btn">Check status</button>
      </div>
      <div id="result" class="result"></div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/layout.js"></script>
  <script>
    const button = document.getElementById('track-btn');
    const result = document.getElementById('result');
    const urlParams = new URLSearchParams(window.location.search);
    const initialToken = urlParams.get('token');
    const initialEmail = urlParams.get('email');

    function formatDate(value) {
      try {
        const date = new Date(value);
        return date.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
      } catch {
        return value;
      }
    }

    function getStatusCopy(status, name) {
      const applicantName = name ? name : 'there';
      switch ((status || '').toLowerCase()) {
        case 'approved':
          return {
            headline: 'Application Approved',
            message: `Congratulations ${applicantName}! Your application has been approved. Please upload your test video using the secure upload form below.`,
            note: 'Only approved applicants can upload their test video here.',
          };
        case 'under review':
        case 'review':
          return {
            headline: 'Under Review',
            message: `Your application is currently under review by our selection team. We appreciate your patience while we assess your submission.`,
            note: 'We will notify you as soon as a decision is made.',
          };
        case 'declined':
          return {
            headline: 'Application Declined',
            message: `Thank you for applying. After careful consideration, we are not moving forward with your application at this time.`,
            note: 'We appreciate your interest and encourage you to apply again in the future.',
          };
        case 'successful':
          return {
            headline: 'Application Successful',
            message: `Great news! Your application has been successful and the next stage is underway.`,
            note: 'A member of our team will contact you shortly with next steps.',
          };
        case 'pending':
        default:
          return {
            headline: 'Application Received',
            message: `We have received your application and it is currently pending review. Thank you for applying to FPL Scout.`,
            note: 'You may check back later for updates or watch your inbox for a tracking email.',
          };
      }
    }

    function renderStatusCard(applicant) {
      const statusText = applicant.status || 'Pending';
      const statusCopy = getStatusCopy(statusText, applicant.name);
      return `
        <div class="status-card">
          <h2>${statusCopy.headline}</h2>
          <div class="status-tag status-${statusText.toLowerCase().replace(/\s+/g, '-')}">${statusText}</div>
          <div class="status-details">
            <div class="status-detail"><span>Applicant:</span><strong>${applicant.name || 'Applicant'}</strong></div>
            <div class="status-detail"><span>Email:</span><strong>${applicant.email || 'N/A'}</strong></div>
            <div class="status-detail"><span>Submitted:</span><strong>${formatDate(applicant.submitted_at || '')}</strong></div>
          </div>
          <p>${statusCopy.message}</p>
          <p>${statusCopy.note}</p>
        </div>
      `;
    }

    function renderUploadSection(token) {
      return `
        <div class="status-card">
          <h2>Approved Test Upload</h2>
          <p>Upload your test video below. The file must be 25MB or smaller and should be in MP4, MOV, MKV, WebM, or AVI format.</p>
          <form id="approved-upload-form" class="upload-form">
            <input id="approved-upload-file" type="file" accept="video/mp4,video/quicktime,video/x-matroska,video/webm,video/avi" required />
            <button id="approved-upload-button" type="submit">Send test video</button>
          </form>
          <div id="upload-result" style="margin-top:1rem;color:#cbd5e1;"></div>
        </div>
      `;
    }

    async function fetchCareerStatus({ email, token }) {
      if (!email && !token) {
        result.innerHTML = '<div class="status-error">Please enter the email you used to apply.</div>';
        return;
      }

      const queryParts = [];
      if (email) queryParts.push(`email=${encodeURIComponent(email)}`);
      if (token) queryParts.push(`token=${encodeURIComponent(token)}`);
      const query = queryParts.join('&');

      result.innerHTML = '<div class="status-card"><p>Checking your application status…</p></div>';

      try {
        const response = await fetch(`/api/careers/track?${query}`);
        const data = await response.json();

        if (!response.ok || !data.success) {
          result.innerHTML = `<div class="status-error">${data.message || 'Unable to locate your application. Please verify your email or token and try again.'}</div>`;
          return;
        }

        result.innerHTML = renderStatusCard(data.applicant);

        if (String(data.applicant.status || '').toLowerCase() === 'approved' && data.applicant.access_token) {
          result.innerHTML += renderUploadSection(data.applicant.access_token);
          attachApproveUploadHandler(data.applicant.access_token);
        }
      } catch (error) {
        console.error('Track error:', error);
        result.innerHTML = '<div class="status-error">Unable to load your application status right now. Please try again later.</div>';
      }
    }

    button.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      await fetchCareerStatus({ email });
    });

    if (initialToken || initialEmail) {
      fetchCareerStatus({ email: initialEmail, token: initialToken });
    }

    function attachApproveUploadHandler(token) {
      const uploadForm = document.getElementById('approved-upload-form');
      const uploadResult = document.getElementById('upload-result');

      if (!uploadForm) return;
      uploadForm.onsubmit = async (event) => {
        event.preventDefault();
        uploadResult.textContent = '';

        const fileInput = document.getElementById('approved-upload-file');
        const file = fileInput?.files?.[0];

        if (!file) {
          uploadResult.textContent = 'Please select a video file to upload.';
          return;
        }

        if (file.size > 25 * 1024 * 1024) {
          uploadResult.textContent = 'Your video must be 25MB or smaller.';
          return;
        }

        const allowedTypes = ['video/mp4', 'video/quicktime', 'video/x-matroska', 'video/webm', 'video/avi'];
        if (!allowedTypes.includes(file.type)) {
          uploadResult.textContent = 'Please upload a video in MP4, MOV, MKV, WebM, or AVI format.';
          return;
        }

        uploadResult.textContent = 'Uploading your test video…';

        const formData = new FormData();
        formData.append('video', file);

        try {
          const uploadResponse = await fetch(`/api/careers/test-upload/${encodeURIComponent(token)}`, {
            method: 'POST',
            body: formData,
          });
          const uploadData = await uploadResponse.json();

          if (!uploadResponse.ok || !uploadData.success) {
            uploadResult.textContent = uploadData.message || 'Upload failed. Please try again.';
            return;
          }

          uploadResult.textContent = uploadData.message || 'Your test video has been uploaded successfully.';
        } catch (uploadError) {
          console.error('Upload error:', uploadError);
          uploadResult.textContent = 'Unable to upload your video right now. Please try again later.';
        }
      };
    }
  </script>
</body>
</html>
