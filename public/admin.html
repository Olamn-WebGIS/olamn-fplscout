<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | FPL Scout</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .admin-page { max-width: 980px; margin: 0 auto; padding: 2rem 1rem; }
    .admin-card { background:#fff; border-radius:18px; box-shadow:0 18px 45px rgba(0,0,0,0.08); padding:2rem; margin-bottom:1.75rem; }
    .admin-card h1 { margin-top:0; }
    .admin-field { margin-bottom:1rem; }
    .admin-field label { display:block; margin-bottom:0.5rem; font-weight:600; }
    .admin-field input, .admin-field textarea { width:100%; padding:0.95rem 1rem; border:1px solid #ddd; border-radius:12px; font-size:1rem; }
    .admin-actions { display:flex; gap:1rem; flex-wrap:wrap; }
    .btn-primary { background:#0070f3; color:#fff; border:none; padding:0.95rem 1.4rem; border-radius:999px; cursor:pointer; font-weight:700; }
    .hidden { display:none; }
    .status { margin-top:1rem; color:#0070f3; }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-card" id="login-card">
      <h1>Admin Dashboard</h1>
      <p>Enter the admin password to publish blog content directly to Supabase.</p>
      <div class="admin-field">
        <label for="admin-password">Admin Password</label>
        <input id="admin-password" type="password" placeholder="Enter admin password" />
      </div>
      <button id="admin-login" class="btn-primary">Unlock Dashboard</button>
      <p class="status" id="admin-login-status"></p>
    </div>

    <div class="admin-card hidden" id="post-card">
      <h2>Publish New Blog Post</h2>
      <div class="admin-field">
        <label for="post-title">Title</label>
        <input id="post-title" type="text" placeholder="Enter post title" />
      </div>
      <div class="admin-field">
        <label for="post-slug">Slug</label>
        <input id="post-slug" type="text" placeholder="example: best-fpl-transfer-strategies" />
      </div>
      <div class="admin-field">
        <label for="post-summary">Summary</label>
        <textarea id="post-summary" rows="4" placeholder="Enter the brief post summary..."></textarea>
      </div>
      <div class="admin-field">
        <label for="post-content">Content</label>
        <textarea id="post-content" rows="10" placeholder="Write the full blog content here..."></textarea>
      </div>
      <div class="admin-actions">
        <button id="publish-post" class="btn-primary">Publish Post</button>
        <button id="logout-admin" class="btn-primary" style="background:#555;">Lock Dashboard</button>
      </div>
      <p class="status" id="admin-post-status"></p>
    </div>
  </div>

  <script src="/layout.js"></script>
  <script src="/app.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
