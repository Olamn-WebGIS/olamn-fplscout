<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4450814131044639"
     crossorigin="anonymous"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | FPL Scout</title>
  <link rel="stylesheet" href="/style.css" />
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    .admin-page { max-width: 980px; margin: 0 auto; padding: 2rem 1rem; }
    .admin-card { background:#fff; border-radius:18px; box-shadow:0 18px 45px rgba(0,0,0,0.08); padding:2rem; margin-bottom:1.75rem; }
    .admin-card h1 { margin-top:0; color:#1d4ed8; text-decoration:underline; }
    .admin-card h2 { color:#2563eb; text-decoration:underline; }
    .admin-field { margin-bottom:1rem; }
    .admin-field label { display:block; margin-bottom:0.5rem; font-weight:600; }
    .admin-field input, .admin-field textarea { width:100%; padding:0.95rem 1rem; border:1px solid #ddd; border-radius:12px; font-size:1rem; }
    .admin-actions { display:flex; gap:1rem; flex-wrap:wrap; }
    .btn-primary { background:#0070f3; color:#fff; border:none; padding:0.95rem 1.4rem; border-radius:999px; cursor:pointer; font-weight:700; }
    .btn-secondary { background:#f3f4f6; color:#111; border:1px solid #d1d5db; padding:0.75rem 1rem; border-radius:999px; cursor:pointer; }
    .btn-secondary.active { background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
    .hidden { display:none; }
    .status { margin-top:1rem; color:#0070f3; }
    .admin-post-list { display:grid; gap:1rem; }
    .admin-post-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:14px; padding:1.1rem 1.25rem; }
    .admin-post-item h3 { margin:0 0 0.5rem; font-size:1.05rem; color:#1e40af; text-decoration:underline; }
    .admin-post-item p { color:#475569; margin:0 0 0.85rem; }
    .admin-post-actions { display:flex; gap:0.75rem; flex-wrap:wrap; }
    .admin-post-actions button { min-width: 92px; }
    #post-content-editor { min-height: 260px; background: #fff; border: 1px solid #d1d5db; border-radius: 12px; }
    .tabs { display:flex; gap:0.75rem; margin-bottom:1rem; flex-wrap:nowrap; overflow-x:auto; padding-bottom:0.25rem; }
    .tabs::-webkit-scrollbar { height: 6px; }
    .tabs::-webkit-scrollbar-thumb { background: rgba(34, 60, 80, 0.2); border-radius: 999px; }
    .tab-btn { white-space: nowrap; flex: 0 0 auto; }
    .table-responsive { overflow-x:auto; }
    .withdrawal-table { width:100%; border-collapse: collapse; min-width: 650px; }
    .withdrawal-table th, .withdrawal-table td { padding: 0.75rem 0.85rem; border-bottom: 1px solid #e5e7eb; text-align: left; }
    .withdrawal-table th { background:#f8fafc; color:#1f2937; font-weight:700; }
    .admin-card { width:100%; }
    @media (max-width: 760px) {
      .admin-page { padding: 1rem; }
      .admin-card { padding: 1rem; }
      .admin-field input, .admin-field textarea { font-size: 0.95rem; }
      .admin-actions { flex-direction: column; align-items: stretch; }
      .btn-primary, .btn-secondary { width: 100%; }
      .admin-post-item { padding: 1rem; }
      .admin-post-actions { justify-content: flex-start; }
      .tabs { gap:0.5rem; }
      .withdrawal-table th, .withdrawal-table td { padding: 0.65rem 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-card" id="login-card">
      <h1>Admin Dashboard</h1>
      <p>Enter the admin password to publish blog content directly to Supabase.</p>
      <div class="admin-field">
        <label for="admin-password">Admin Password</label>
        <input id="admin-password" type="password" placeholder="Enter admin password" />
      </div>
      <button id="admin-login" class="btn-primary">Unlock Dashboard</button>
      <p class="status" id="admin-login-status"></p>
    </div>

    <div class="admin-card hidden" id="admin-tabs-card">
      <div class="tabs">
        <button class="btn-secondary tab-btn active" data-tab="blog-tab">Blog</button>
        <button class="btn-secondary tab-btn" data-tab="withdrawal-tab">Withdrawal Requests</button>
      </div>
    </div>

    <div id="blog-tab" class="tab-panel hidden active">
      <div class="admin-card hidden" id="post-card">
      <h2>Publish New Blog Post</h2>
      <div class="admin-field">
        <label for="post-title">Title</label>
        <input id="post-title" type="text" placeholder="Enter post title" />
      </div>
      <div class="admin-field">
        <label for="post-slug">Slug</label>
        <input id="post-slug" type="text" placeholder="example: best-fpl-transfer-strategies" />
      </div>
      <div class="admin-field">
        <label for="post-summary">Summary</label>
        <textarea id="post-summary" rows="4" placeholder="Enter the brief post summary..."></textarea>
      </div>
      <div class="admin-field">
        <label for="post-content-editor">Content</label>
        <div id="post-content-editor"></div>
      </div>
      <div class="admin-actions">
        <button id="publish-post" class="btn-primary">Publish Post</button>
        <button id="cancel-edit" class="btn-secondary hidden">Cancel Edit</button>
        <button id="logout-admin" class="btn-primary" style="background:#555;">Lock Dashboard</button>
      </div>
      <p class="status" id="admin-post-status"></p>
      <p class="status" id="newsletter-status"></p>
    </div>
  </div>

  <div class="admin-card hidden" id="posts-list-card">
    <h2>Existing Posts</h2>
    <div id="admin-post-list" class="admin-post-list"></div>
  </div>
  </div>

  <div id="withdrawal-tab" class="tab-panel hidden">
    <div class="admin-card hidden" id="withdrawal-requests-card">
      <h2>Affiliate Withdrawal Requests</h2>
      <p class="status" id="withdrawal-requests-note">Unlock the dashboard and open this tab to load withdrawal requests.</p>
      <div id="withdrawal-requests-container">
        <table id="withdrawal-requests-table" class="withdrawal-table">
          <thead>
            <tr>
              <th>Affiliate</th>
              <th>Amount (₦)</th>
              <th>Bank Details</th>
              <th>Status</th>
              <th>Requested</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
